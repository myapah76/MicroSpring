<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Verdana, sans-serif; background-color: #f8f1e7; padding: 40px;">

<div style="max-width: 520px; margin: auto; background: #fff;
            border-radius: 16px; padding: 30px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);">

    <h1 style="text-align:center; color:#4b2e2a;">MicroSpring</h1>

    <p>Xin chào bạn,</p>
    <p>Đây là mã OTP của bạn:</p>

    <div style="text-align:center; margin:30px 0;">
        <span style="font-size:34px; font-weight:bold; letter-spacing:8px;"
              th:text="${otp}">
            123456
        </span>
    </div>

    <p>⏳ Mã có hiệu lực trong <b>10 phút</b></p>

    <p style="font-size:12px; color:#aaa;">
        © <span th:text="${year}"></span> Cà Hong Bạn
    </p>

</div>
</body>
</html>
