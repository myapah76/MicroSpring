<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; padding: 20px;">

<div style="max-width:500px; margin:auto; background:#fff; padding:25px; border-radius:12px;">

    <h2 style="color:#4b2e2a;">Password Reset</h2>

    <p>Xin chào bạn,</p>

    <p>Bạn đã yêu cầu đặt lại mật khẩu. Nhấn vào nút bên dưới:</p>

    <div style="text-align:center; margin:30px 0;">
        <a th:href="${resetLink}"
           style="background:#4b2e2a; color:white; padding:12px 20px; text-decoration:none; border-radius:8px;">
            Reset Password
        </a>
    </div>

    <p>⏳ Link có hiệu lực trong 1 giờ.</p>

    <p style="font-size:12px; color:#aaa;">
        © <span th:text="${year}"></span> Cà Hong Bạn
    </p>

</div>

</body>
</html>
